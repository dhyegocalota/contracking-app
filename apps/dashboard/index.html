<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#d94d73" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Contracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            colors: {
              abyss: { bg: '#09090f', card: 'rgba(255,255,255,0.02)' },
              accent: { DEFAULT: '#d94d73', dark: '#b83a5e', light: '#f06292', glow: 'rgba(185,58,94,0.25)' },
            },
          },
        },
      };
    </script>
    <style>
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090f;
          --text-primary: rgba(255, 255, 255, 0.85);
          --text-secondary: rgba(255, 255, 255, 0.5);
          --text-muted: rgba(255, 255, 255, 0.25);
          --text-faint: rgba(255, 255, 255, 0.15);
          --accent: #d94d73;
          --card-bg: rgba(255, 255, 255, 0.02);
          --card-border: rgba(255, 255, 255, 0.04);
          --divider: rgba(255, 255, 255, 0.03);
        }
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8f7f5;
          --text-primary: rgba(0, 0, 0, 0.85);
          --text-secondary: rgba(0, 0, 0, 0.5);
          --text-muted: rgba(0, 0, 0, 0.3);
          --text-faint: rgba(0, 0, 0, 0.15);
          --accent: #c94060;
          --card-bg: rgba(0, 0, 0, 0.02);
          --card-border: rgba(0, 0, 0, 0.06);
          --divider: rgba(0, 0, 0, 0.04);
        }
      }

      body {
        background: var(--bg);
        color: var(--text-primary);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      input, textarea, select {
        font-size: 16px;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes slideUp {
        from { transform: translateX(-50%) translateY(100%); }
        to { transform: translateX(-50%) translateY(0); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 60px rgba(185,58,94,0.25); }
        50% { box-shadow: 0 0 80px rgba(185,58,94,0.4); }
      }

      @keyframes scaleIn {
        from { transform: scale(0.95); opacity: 0.8; }
        to { transform: scale(1); opacity: 1; }
      }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/app.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js');
      }
    </script>
  </body>
</html>
